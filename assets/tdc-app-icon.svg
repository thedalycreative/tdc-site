<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#2f9ea0"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip">
      <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230"/>
    </clipPath>
  </defs>
  <!-- Gradient tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>
  <!-- Glass sheen -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#sheen)" clip-path="url(#clip)"/>
  <!-- Spark (white, centered, rotated 8°) -->
  <g transform="translate(512, 512) rotate(8) scale(5.6)" fill="#ffffff">
    <rect x="-6" y="-44" width="12" height="88" rx="6"/>
    <rect x="-6" y="-44" width="12" height="88" rx="6" transform="rotate(60)"/>
    <rect x="-6" y="-44" width="12" height="88" rx="6" transform="rotate(120)"/>
  </g>
</svg>
